<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./2.jpg">
  <title>ADONGI</title>
</head>
<style>
* {
  margin: 0;
  box-sizing: border-box;
  overflow: hidden;
}
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100dvh;
  width: 100dvw;
  background: #0d0d0d;
  filter: sepia(.4) blur(.5px) contrast(0.85) brightness(.7) saturate(2);
}
video {
  width: min(100vmin, 60rem); 
  aspect-ratio: 1/1;
}
#photo {
  pointer-events: auto;
}
#videoContainer, video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: none;
}
</style>
<body>

    <audio id="music" preload="auto"></audio>

    <video src="0000-0150.mp4" id="photo" preload="auto" muted></video>

    <div id="videoContainer">
        <video id="video1" preload="auto"></video>
        <video id="video2" preload="auto" loop></video>
    </div>

    <script>
        const photo = document.getElementById('photo');
        const videoContainer = document.getElementById('videoContainer');
        const video1 = document.getElementById('video1');
        const video2 = document.getElementById('video2');
        const music = document.getElementById('music');
        let clicked = false;

        photo.addEventListener('click', function() {
            if (clicked) return;
            clicked = true;
            
            music.src = 'tagmp3_tmpsk2t1vco.mp3';
            music.volume = 0.1; // Начальная тихая громкость
            
            
            video1.src = '0000-0150.mp4';
            video2.src = '0150-0250.mp4';
            video1.play();
            video2.style.display = 'none';

            // Плавное увеличение громкости через 6 секунд
            setTimeout(() => {
              music.play();
                let currentVolume = 0.05;
                const volumeIncrease = setInterval(() => {
                    currentVolume += 0.002; // Увеличиваем на 0.05 каждые 100ms
                    if (currentVolume >= 1) {
                        currentVolume = 1;
                        clearInterval(volumeIncrease);
                    }
                    music.volume = currentVolume;
                }, 100);
            }, 6000);
        });

        video1.addEventListener('ended', () => {
            video1.style.display = 'none';
            video2.style.display = 'block';
            video2.play();
        });

    </script>
</body>
</html>
