<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="./2.jpg">
</head>
<style>
* {
  margin: 0;
  box-sizing: border-box;
  overflow: hidden;
}
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100dvh;
  width: 100dvw;
  background: #0d0d0d;
  filter: sepia(.4) blur(.5px) contrast(0.85) brightness(.7) saturate(2);
}
img, video {
  width: min(100vmin, 60rem); 
  aspect-ratio: 1/1;
}
.video-container, video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: none;
}
</style>
<body>
    <img src="1.jpg" id="photo">
    <audio id="music" preload="auto"></audio>
    <div class="video-container" id="videoContainer">
        <video id="video1" preload="auto"></video>
        <video id="video2" preload="auto" loop></video>
    </div>

    <script>
        const photo = document.getElementById('photo');
        const videoContainer = document.getElementById('videoContainer');
        const video1 = document.getElementById('video1');
        const video2 = document.getElementById('video2');
        const music = document.getElementById('music');
        let clicked = false;

        photo.addEventListener('click', function() {
            if (clicked) return;
            clicked = true;
            
            music.src = 'tagmp3_tmpsk2t1vco.mp3';
            video1.src = '0000-0150.mp4';
            video2.src = '0150-0250.mp4';
            video1.play();
            video2.style.display = 'none';

            setTimeout(() => {
                music.play();
            }, 6000);
        });

        video1.addEventListener('ended', () => {
            video1.style.display = 'none';
            video2.style.display = 'block';
            video2.play();
        });

    </script>
</body>
</html>
